name: security-secrets

on:
  workflow_call:
    inputs:
      mode:
        required: false
        default: "fast"
        type: string

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  gitleaks:
    runs-on: wasaa-org-runners
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.mode == 'full' && 0 || 1 }}

      - uses: actions/checkout@v4
        with:
          repository: web-masters-ke/wasaa-ci
          ref: main
          path: .wasaa-ci

      - name: Install gitleaks
        run: |
          curl -sSL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tgz gitleaks && sudo mv gitleaks /usr/local/bin/

      - name: Gitleaks (diff for PR, full history for release)
        run: |
          if [ "${{ inputs.mode }}" = "fast" ] && [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            gitleaks detect --config .wasaa-ci/configs/gitleaks.toml \
              --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --redact --report-format sarif --report-path gitleaks.sarif --exit-code 1
          else
            gitleaks detect --config .wasaa-ci/configs/gitleaks.toml \
              --redact --report-format sarif --report-path gitleaks.sarif --exit-code 1
          fi

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  trufflehog:
    if: inputs.mode == 'full'
    runs-on: wasaa-org-runners
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (verified only)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --fail
