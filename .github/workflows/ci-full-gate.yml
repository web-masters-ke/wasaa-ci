name: ci-full-gate

on:
  workflow_call:
    inputs:
      stack:
        required: true
        type: string
      db:
        required: false
        default: "none"
        type: string
      has_openapi:
        required: false
        default: false
        type: boolean
      has_frontend_bundle:
        required: false
        default: false
        type: boolean
      has_container:
        description: "Repo builds a container image (Dockerfile at repo root or path via container_context)"
        required: false
        default: false
        type: boolean
      container_context:
        required: false
        default: "."
        type: string
      container_dockerfile:
        required: false
        default: "Dockerfile"
        type: string
      has_iac:
        description: "Repo contains IaC (Terraform, K8s manifests, Helm charts)"
        required: false
        default: false
        type: boolean
      node_version:
        required: false
        default: "20"
        type: string
      python_version:
        required: false
        default: "3.12"
        type: string
      dart_channel:
        required: false
        default: "stable"
        type: string
      go_version:
        required: false
        default: "1.23"
        type: string
    secrets:
      SEMGREP_APP_TOKEN:
        required: false
    outputs:
      passed:
        description: "true iff every blocking rule passed"
        value: ${{ jobs.summary.outputs.passed }}

concurrency:
  group: ci-full-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # do not cancel a release-tag gate mid-run

permissions:
  contents: read
  packages: read
  pull-requests: write
  security-events: write
  actions: read
  id-token: write   # for SBOM attestation

jobs:
  lang-typescript:
    if: contains(inputs.stack, 'typescript')
    uses: web-masters-ke/wasaa-ci/.github/workflows/lang-typescript.yml@main
    with:
      node_version: ${{ inputs.node_version }}
      mode: full

  lang-python:
    if: contains(inputs.stack, 'python')
    uses: web-masters-ke/wasaa-ci/.github/workflows/lang-python.yml@main
    with:
      python_version: ${{ inputs.python_version }}
      mode: full

  lang-dart:
    if: contains(inputs.stack, 'dart')
    uses: web-masters-ke/wasaa-ci/.github/workflows/lang-dart.yml@main
    with:
      dart_channel: ${{ inputs.dart_channel }}
      mode: full

  lang-go:
    if: contains(inputs.stack, 'go')
    uses: web-masters-ke/wasaa-ci/.github/workflows/lang-go.yml@main
    with:
      go_version: ${{ inputs.go_version }}
      mode: full

  security-sast:
    uses: web-masters-ke/wasaa-ci/.github/workflows/security-sast.yml@main
    with:
      stack: ${{ inputs.stack }}
      mode: full
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  security-secrets:
    uses: web-masters-ke/wasaa-ci/.github/workflows/security-secrets.yml@main
    with:
      mode: full   # full git history

  security-sca:
    uses: web-masters-ke/wasaa-ci/.github/workflows/security-sca.yml@main
    with:
      stack: ${{ inputs.stack }}
      mode: full

  security-container:
    if: inputs.has_container
    uses: web-masters-ke/wasaa-ci/.github/workflows/security-container.yml@main
    with:
      context: ${{ inputs.container_context }}
      dockerfile: ${{ inputs.container_dockerfile }}
      mode: full

  security-iac:
    if: inputs.has_iac
    uses: web-masters-ke/wasaa-ci/.github/workflows/security-container.yml@main
    with:
      context: ${{ inputs.container_context }}
      dockerfile: ${{ inputs.container_dockerfile }}
      mode: iac-only

  security-sbom:
    uses: web-masters-ke/wasaa-ci/.github/workflows/security-sbom.yml@main
    with:
      stack: ${{ inputs.stack }}

  db-safety:
    if: inputs.db != 'none'
    uses: web-masters-ke/wasaa-ci/.github/workflows/db-safety.yml@main
    with:
      stack: ${{ inputs.stack }}
      db: ${{ inputs.db }}
      mode: full

  quality-tests:
    uses: web-masters-ke/wasaa-ci/.github/workflows/quality-tests.yml@main
    with:
      stack: ${{ inputs.stack }}
      node_version: ${{ inputs.node_version }}
      python_version: ${{ inputs.python_version }}
      dart_channel: ${{ inputs.dart_channel }}
      go_version: ${{ inputs.go_version }}
      mode: full

  quality-api:
    if: inputs.has_openapi
    uses: web-masters-ke/wasaa-ci/.github/workflows/quality-api.yml@main
    with:
      mode: full

  quality-perf:
    if: inputs.has_frontend_bundle
    uses: web-masters-ke/wasaa-ci/.github/workflows/quality-perf.yml@main
    with:
      mode: full

  summary:
    name: summary
    needs:
      - lang-typescript
      - lang-python
      - lang-dart
      - lang-go
      - security-sast
      - security-secrets
      - security-sca
      - security-container
      - security-iac
      - security-sbom
      - db-safety
      - quality-tests
      - quality-api
      - quality-perf
    if: always()
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.enforce.outputs.passed }}
    steps:
      - name: Checkout wasaa-ci
        uses: actions/checkout@v4
        with:
          repository: web-masters-ke/wasaa-ci
          ref: main
          path: .wasaa-ci

      - name: Checkout target repo (for waiver file)
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Roll up findings
        env:
          GATE: full
          RESULTS_JSON: ${{ toJson(needs) }}
          WAIVER_FILE: repo/.wasaa-ci-waiver.yml
        run: bash .wasaa-ci/scripts/gate-summary.sh

      - name: Upload gate summary
        uses: actions/upload-artifact@v4
        with:
          name: wasaa-ci-gate-summary
          path: |
            gate-summary.md
            gate-summary.json

      - name: Enforce gate
        id: enforce
        run: |
          bash .wasaa-ci/scripts/severity-gate.sh --gate full
          echo "passed=true" >> "$GITHUB_OUTPUT"

  report:
    needs: summary
    if: always()
    uses: web-masters-ke/wasaa-ci/.github/workflows/report-aggregate.yml@main
    with:
      gate: full
