# Drop this in a repo with multiple languages (e.g. TS backend + Dart mobile)
# Set inputs.stack to the comma-separated list of languages actually present.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*.*.*']

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fast:
    if: github.event_name == 'pull_request'
    uses: web-masters-ke/wasaa-ci/.github/workflows/ci-fast.yml@main
    with:
      stack: typescript,python,dart,go
      db: postgres,mongo,redis
      has_openapi: true
      node_version: '20'
      python_version: '3.12'
      dart_channel: stable
      go_version: '1.23'
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.WASAA_SEMGREP_APP_TOKEN }}

  full:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    uses: web-masters-ke/wasaa-ci/.github/workflows/ci-full-gate.yml@main
    with:
      stack: typescript,python,dart,go
      db: postgres,mongo,redis
      has_openapi: true
      has_frontend_bundle: true
      has_container: true
      container_dockerfile: Dockerfile
      has_iac: true
      node_version: '20'
      python_version: '3.12'
      dart_channel: stable
      go_version: '1.23'
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.WASAA_SEMGREP_APP_TOKEN }}
