rules:
  - id: wasaa-py-no-pickle-loads-untrusted
    languages: [python]
    message: "pickle.loads on network data = RCE. Use JSON or a safe serializer."
    severity: ERROR
    pattern-either:
      - pattern: pickle.loads(request.$X)
      - pattern: pickle.loads($X.body)
      - pattern: pickle.loads($X.get(...))

  - id: wasaa-py-no-yaml-load-unsafe
    languages: [python]
    message: "yaml.load without SafeLoader can execute arbitrary code. Use yaml.safe_load."
    severity: ERROR
    pattern: yaml.load($X)

  - id: wasaa-py-no-subprocess-shell-true
    languages: [python]
    message: "subprocess with shell=True enables shell injection when args are dynamic."
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: subprocess.run(..., shell=True, ...)
          - pattern: subprocess.Popen(..., shell=True, ...)
          - pattern: subprocess.check_output(..., shell=True, ...)
          - pattern: os.system($X)

  - id: wasaa-py-no-fastapi-endpoint-without-response-model
    languages: [python]
    message: "FastAPI endpoint without response_model leaks internal fields. Declare a Pydantic response_model."
    severity: WARNING
    patterns:
      - pattern-either:
          - pattern: |
              @$APP.get(...)
              def $F(...): ...
          - pattern: |
              @$APP.post(...)
              def $F(...): ...
      - pattern-not-inside: |
          @$APP.$METHOD(..., response_model=$M, ...)
          ...

  - id: wasaa-py-no-django-raw
    languages: [python]
    message: "Django .raw() / .extra() bypasses ORM protections. Use querysets or parameterize carefully."
    severity: WARNING
    pattern-either:
      - pattern: $M.objects.raw(...)
      - pattern: $M.objects.extra(...)
